<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Daily mobile English practice for SOA Exam PA writing.">
    <title>PA 通勤英文</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">SOA Exam PA English</p>
        <h1>PA 通勤英文</h1>
      </div>
    </header>

    <main class="english-practice">
      <section class="daily-hero">
        <p class="eyebrow">Daily PA English</p>
        <h2>今天通勤練 3 句</h2>
        <p>先看中文意思，自己寫一次英文，再打開參考答案與句型解析。重點是把 PA 考試會用到的句型練到順口。</p>
      </section>

      <section class="daily-toolbar" aria-label="Daily English controls">
        <button id="todayEnglishButton" type="button">今日 3 句</button>
        <button id="reviewEnglishButton" class="secondary" type="button">收藏複習</button>
        <button id="shuffleEnglishButton" class="secondary" type="button">換一組</button>
      </section>

      <section id="englishCards" class="english-cards"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
